name: Release

on:
  push:
    branches:
      - master

jobs:
  prepare_release:
    runs-on: windows-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npm run type-check

      - name: Run Unit Tests
        run: npm test

      - name: Release and Bump Version
        id: version
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.0-flash' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Generate raw changelog and bump version (skips commit/tag)
          npm run release
          
          # AI cleanup of the changelog
          npx ts-node scripts/ai-changelog.ts
          
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Manually commit, tag and push
          git add CHANGELOG.md package.json package-lock.json
          git commit -m "chore(release): $VERSION"
          git tag "v$VERSION"
          git push --follow-tags origin master

  build_and_publish:
    needs: prepare_release
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build -- --publish always

      - name: Build & publish (Mac)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:mac -- --publish always

      - name: Update Homebrew Cask
        if: matrix.os == 'macos-latest' && success()
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          # 1. Locate the DMG file
          DMG_PATH=$(find dist -maxdepth 1 -name "*.dmg" | head -n 1)
          if [ -z "$DMG_PATH" ]; then
            echo "Error: DMG file not found in dist/"
            exit 1
          fi
          DMG_FILENAME=$(basename "$DMG_PATH")
          echo "Found DMG: $DMG_FILENAME"

          # 2. Calculate SHA256 checksum
          SHA256=$(shasum -a 256 "$DMG_PATH" | awk '{ print $1 }')
          echo "SHA256: $SHA256"

          # 3. Retrieve version
          VERSION=$(node -p "require('./package.json').version")
          echo "Version: $VERSION"

          # 4. Prepare URL Filename for Homebrew Cask (URL-encoded and uses #{version})
          URL_FILENAME="${DMG_FILENAME// /%20}"
          URL_FILENAME=$(echo "$URL_FILENAME" | sed "s/$VERSION/#{version}/g")
          echo "URL Filename for Cask: $URL_FILENAME"

          # 5. Clone homebrew-tap
          git clone https://x-access-token:${TAP_TOKEN}@github.com/EYssel/homebrew-tap.git homebrew-tap
          cd homebrew-tap
          mkdir -p Casks

          # 6. Write the Cask formula
          cat <<EOF > Casks/weekly-planner.rb
cask "weekly-planner" do
  version "${VERSION}"
  sha256 "${SHA256}"

  url "https://github.com/EYssel/planner-app/releases/download/v#{version}/${URL_FILENAME}"
  name "Weekly Planner"
  desc "A simple weekly planning desktop app"
  homepage "https://github.com/EYssel/planner-app"

  app "Weekly Planner.app"

  caveats <<~EOS
    Because this app is self-signed/unsigned, you may need to clear the quarantine attribute after installation:
      xattr -cr "/Applications/Weekly Planner.app"
    Alternatively, you can install it using:
      brew install --cask --no-quarantine weekly-planner
  EOS

  zap trash: [
    "~/Library/Application Support/weekly-planner",
    "~/Library/Application Support/weekly-planner-dev",
    "~/Library/Preferences/com.estianyssel.weekly-planner.plist",
    "~/Library/Saved Application State/com.estianyssel.weekly-planner.savedState",
  ]
end
EOF

          # 7. Commit and Push to Tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/weekly-planner.rb
          git commit -m "bump: weekly-planner to v${VERSION}" || echo "No changes to commit"
          git push origin master || git push origin main
