<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0c0c0c;
      --surface:  #141414;
      --surface2: #1a1a1a;
      --border:   #2a2a2a;
      --accent:   #e8ff47;
      --accent2:  #ff6b35;
      --text:     #f0f0f0;
      --muted:    #555;
      --done:     #2a2a2a;
      --done-text:#444;
      --today-bg: #1c1f0f;
      --today-border: #e8ff47;
      --radius:   4px;
    }

    /* ── Themes ── */
    body.theme-light {
      --bg: #f5f5f5; --surface: #ffffff; --surface2: #eeeeee; --border: #dddddd;
      --accent: #007bff; --accent2: #dc3545; --text: #222222; --muted: #888888;
      --done: #eeeeee; --done-text:#aaaaaa; --today-bg: #f0f7ff; --today-border: #007bff;
    }
    body.theme-matrix {
      --bg: #000000; --surface: #000a00; --surface2: #001100; --border: #003300;
      --accent: #00ff41; --accent2: #008f11; --text: #00ff41; --muted: #003b00;
      --done: #000a00; --done-text:#003b00; --today-bg: #001a00; --today-border: #00ff41;
    }
    body.theme-nord {
      --bg: #2e3440; --surface: #3b4252; --surface2: #434c5e; --border: #4c566a;
      --accent: #88c0d0; --accent2: #bf616a; --text: #eceff4; --muted: #616e88;
      --done: #3b4252; --done-text:#616e88; --today-bg: #434c5e; --today-border: #88c0d0;
    }
    body.theme-dracula {
      --bg: #282a36; --surface: #44475a; --surface2: #6272a4; --border: #44475a;
      --accent: #bd93f9; --accent2: #ff79c6; --text: #f8f8f2; --muted: #6272a4;
      --done: #44475a; --done-text: #6272a4; --today-bg: #44475a; --today-border: #bd93f9;
    }
    body.theme-solarized-dark {
      --bg: #002b36; --surface: #073642; --surface2: #586e75; --border: #073642;
      --accent: #268bd2; --accent2: #dc322f; --text: #839496; --muted: #586e75;
      --done: #073642; --done-text: #586e75; --today-bg: #073642; --today-border: #268bd2;
    }
    body.theme-solarized-light {
      --bg: #fdf6e3; --surface: #eee8d5; --surface2: #93a1a1; --border: #eee8d5;
      --accent: #268bd2; --accent2: #dc322f; --text: #657b83; --muted: #93a1a1;
      --done: #eee8d5; --done-text: #93a1a1; --today-bg: #eee8d5; --today-border: #268bd2;
    }
    body.theme-gruvbox-dark {
      --bg: #282828; --surface: #3c3836; --surface2: #504945; --border: #3c3836;
      --accent: #d65d0e; --accent2: #cc241d; --text: #ebdbb2; --muted: #928374;
      --done: #3c3836; --done-text: #928374; --today-bg: #3c3836; --today-border: #d65d0e;
    }
    body.theme-monokai {
      --bg: #272822; --surface: #3e3d32; --surface2: #75715e; --border: #3e3d32;
      --accent: #f92672; --accent2: #fd971f; --text: #f8f8f2; --muted: #75715e;
      --done: #3e3d32; --done-text: #75715e; --today-bg: #3e3d32; --today-border: #f92672;
    }
    body.theme-one-dark {
      --bg: #282c34; --surface: #3e4451; --surface2: #545862; --border: #3e4451;
      --accent: #61afef; --accent2: #e06c75; --text: #abb2bf; --muted: #5c6370;
      --done: #3e4451; --done-text: #5c6370; --today-bg: #3e4451; --today-border: #61afef;
    }
    body.theme-synthwave {
      --bg: #262335; --surface: #241b2f; --surface2: #44355a; --border: #44355a;
      --accent: #ff7edb; --accent2: #fe4450; --text: #ffffff; --muted: #848bb2;
      --done: #241b2f; --done-text: #848bb2; --today-bg: #241b2f; --today-border: #ff7edb;
    }
    body.theme-cyberpunk {
      --bg: #000000; --surface: #1a1a1a; --surface2: #333333; --border: #fdf500;
      --accent: #fdf500; --accent2: #ff00ff; --text: #fdf500; --muted: #666666;
      --done: #1a1a1a; --done-text: #666666; --today-bg: #1a1a1a; --today-border: #fdf500;
    }
    body.theme-forest {
      --bg: #1b2b1c; --surface: #2d4a2e; --surface2: #3e6640; --border: #2d4a2e;
      --accent: #8fbc8f; --accent2: #cd5c5c; --text: #e0e0e0; --muted: #6b8e23;
      --done: #2d4a2e; --done-text: #6b8e23; --today-bg: #2d4a2e; --today-border: #8fbc8f;
    }
    body.theme-ocean {
      --bg: #0f172a; --surface: #1e293b; --surface2: #334155; --border: #1e293b;
      --accent: #38bdf8; --accent2: #f43f5e; --text: #f1f5f9; --muted: #64748b;
      --done: #1e293b; --done-text: #64748b; --today-bg: #1e293b; --today-border: #38bdf8;
    }
    body.theme-sepia {
      --bg: #704214; --surface: #8b4513; --surface2: #a0522d; --border: #8b4513;
      --accent: #f5deb3; --accent2: #cd853f; --text: #f5deb3; --muted: #d2b48c;
      --done: #8b4513; --done-text: #d2b48c; --today-bg: #8b4513; --today-border: #f5deb3;
    }
    body.theme-coffee {
      --bg: #3e2723; --surface: #4e342e; --surface2: #5d4037; --border: #4e342e;
      --accent: #d7ccc8; --accent2: #a1887f; --text: #d7ccc8; --muted: #8d6e63;
      --done: #4e342e; --done-text: #8d6e63; --today-bg: #4e342e; --today-border: #d7ccc8;
    }
    body.theme-midnight {
      --bg: #000000; --surface: #0a0a0a; --surface2: #1a1a1a; --border: #1a1a1a;
      --accent: #1e90ff; --accent2: #ff4500; --text: #ffffff; --muted: #333333;
      --done: #0a0a0a; --done-text: #333333; --today-bg: #0a0a0a; --today-border: #1e90ff;
    }
    body.theme-pastel {
      --bg: #fff5f8; --surface: #ffebee; --surface2: #fce4ec; --border: #ffebee;
      --accent: #ff80ab; --accent2: #f06292; --text: #5d4037; --muted: #f48fb1;
      --done: #ffebee; --done-text: #f48fb1; --today-bg: #ffebee; --today-border: #ff80ab;
    }
    body.theme-lavender {
      --bg: #f3e5f5; --surface: #e1bee7; --surface2: #ce93d8; --border: #e1bee7;
      --accent: #9c27b0; --accent2: #ba68c8; --text: #4a148c; --muted: #ab47bc;
      --done: #e1bee7; --done-text: #ab47bc; --today-bg: #e1bee7; --today-border: #9c27b0;
    }
    body.theme-emerald {
      --bg: #003d33; --surface: #004d40; --surface2: #00695c; --border: #004d40;
      --accent: #1de9b6; --accent2: #64ffda; --text: #e0f2f1; --muted: #00897b;
      --done: #004d40; --done-text: #00897b; --today-bg: #004d40; --today-border: #1de9b6;
    }
    body.theme-ruby {
      --bg: #310000; --surface: #4a0000; --surface2: #6a0000; --border: #4a0000;
      --accent: #ff1744; --accent2: #ff5252; --text: #ffebee; --muted: #c62828;
      --done: #4a0000; --done-text: #c62828; --today-bg: #4a0000; --today-border: #ff1744;
    }
    body.theme-amber {
      --bg: #000000; --surface: #111111; --surface2: #222222; --border: #ffb000;
      --accent: #ffb000; --accent2: #ffcc00; --text: #ffb000; --muted: #664400;
      --done: #111111; --done-text: #664400; --today-bg: #111111; --today-border: #ffb000;
    }
    body.theme-slate {
      --bg: #0f172a; --surface: #1e293b; --surface2: #334155; --border: #334155;
      --accent: #94a3b8; --accent2: #cbd5e1; --text: #f8fafc; --muted: #475569;
      --done: #1e293b; --done-text: #475569; --today-bg: #1e293b; --today-border: #94a3b8;
    }
    body.theme-sakura {
      --bg: #fff0f6; --surface: #ffdeeb; --surface2: #ffc9db; --border: #ffdeeb;
      --accent: #ff85c0; --accent2: #f759ab; --text: #c02d53; --muted: #ffadd2;
      --done: #ffdeeb; --done-text: #ffadd2; --today-bg: #ffdeeb; --today-border: #ff85c0;
    }
    body.theme-high-contrast {
      --bg: #000000; --surface: #000000; --surface2: #333333; --border: #ffffff;
      --accent: #ffff00; --accent2: #00ffff; --text: #ffffff; --muted: #999999;
      --done: #000000; --done-text: #999999; --today-bg: #000000; --today-border: #ffff00;
    }
    body.theme-minimalist {
      --bg: #ffffff; --surface: #fcfcfc; --surface2: #f5f5f5; --border: #eeeeee;
      --accent: #333333; --accent2: #666666; --text: #333333; --muted: #cccccc;
      --done: #fcfcfc; --done-text: #cccccc; --today-bg: #fcfcfc; --today-border: #333333;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif;
      font-weight: 300; height: 100vh; display: flex; flex-direction: column; overflow: hidden; user-select: none;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .logo { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); }
    .week-nav { display: flex; align-items: center; gap: 10px; }
    .week-info { display: flex; flex-direction: column; align-items: center; min-width: 130px; }
    .cw-label { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: var(--accent); line-height: 1.2; }
    .week-label { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
    .nav-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: 18px; width: 28px; height: 28px; border-radius: var(--radius); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
    .nav-btn:disabled { opacity: 0.2; cursor: default; }

    .header-right { display: flex; align-items: center; gap: 12px; }
    .icon-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); width: 28px; height: 28px; border-radius: var(--radius); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Grid ── */
    .grid {
      flex: 1; display: grid; grid-template-columns: repeat(6, 1fr);
      gap: 1px; background: var(--border); overflow: hidden;
    }

    .day-col {
      background: var(--surface); height: 100%; overflow: hidden;
    }
    .day-col.today { background: var(--today-bg); }

    .day-section {
      display: grid;
      grid-template-rows: 64px 1fr auto 32px; /* LOCKED HEIGHTS */
      height: 100%;
      overflow: hidden;
    }

    .day-header {
      padding: 10px 12px 8px; border-bottom: 1px solid var(--border);
      height: 64px; display: flex; flex-direction: column; justify-content: center;
    }
    .day-col.today .day-header { border-bottom-color: var(--today-border); }
    .day-name { font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; }
    .day-col.today .day-name { color: var(--accent); }
    .day-date { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; color: var(--text); line-height: 1.1; margin-top: 2px; }
    .day-col.today .day-date { color: var(--accent); }
    .day-month { font-size: 10px; color: var(--muted); text-transform: uppercase; }

    .day-tasks {
      overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; min-height: 0;
    }
    .day-tasks::-webkit-scrollbar { width: 4px; }
    .day-tasks::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    .task-item {
      display: grid; grid-template-columns: 20px 1fr 16px; align-items: start;
      gap: 6px; padding: 6px; border-radius: var(--radius); border: 1px solid transparent;
      animation: fadeIn 0.15s ease both; cursor: grab;
    }
    .task-item:active { cursor: grabbing; }
    .task-item.dragging { opacity: 0.3; background: var(--surface2); border: 1px dashed var(--accent); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }

    .drop-indicator {
      display: none; border: 1px dashed var(--accent); border-radius: var(--radius);
      margin: 4px; color: var(--accent); font-size: 10px; text-align: center; padding: 12px;
      opacity: 0.5; pointer-events: none;
    }

    .done-section {
      border-top: 1px solid var(--accent); /* RE-RESTORED ACCENT COLOR */
      display: none; flex-direction: column; min-height: 0;
    }
    .done-section.visible,
    body.dragging-active .done-section {
      display: flex;
    }
    .done-header {
      font-size: 11px; font-weight: 500; color: var(--muted); padding: 8px 12px;
      user-select: none; text-transform: uppercase; letter-spacing: 0.05em;
      height: 32px; display: flex; align-items: center; flex-shrink: 0;
    }
    .done-tasks { max-height: 120px; overflow-y: auto; padding: 8px; }

    body.dragging-active .drop-indicator { display: block; }
    body.dragging-active .day-tasks { border: 1px dashed var(--accent); background: rgba(232, 255, 71, 0.05); }

    .check-btn {
      width: 16px; height: 16px; border: 1.5px solid var(--border); border-radius: 3px;
      background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
      margin-top: 2px; transition: all 0.1s; color: transparent; font-size: 9px;
    }
    .task-item.done .check-btn { background: var(--accent); border-color: var(--accent); color: #000; }

    .task-text-container { position: relative; width: 100%; min-height: 18px; }
    .task-display { font-size: 12px; line-height: 1.4; color: var(--text); word-break: break-word; white-space: pre-wrap; }
    .task-edit {
      background: transparent; border: none; color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 12px; outline: none; width: 100%; line-height: 1.4; resize: none; overflow: hidden; display: none;
    }
    .task-item.editing .task-display { display: none; }
    .task-item.editing .task-edit { display: block; }
    .task-item.done .task-display { color: var(--done-text); text-decoration: line-through; }
    .del-btn { background: transparent; border: none; color: transparent; cursor: pointer; font-size: 14px; transition: color 0.1s; }
    .task-item:hover .del-btn { color: var(--muted); }
    .del-btn:hover { color: var(--accent2) !important; }

    .add-task-btn {
      display: flex; align-items: center; gap: 4px; background: transparent; border: none;
      color: var(--muted); cursor: pointer; font-size: 11px; padding: 4px 6px; width: 100%; text-align: left;
    }
    .add-task-btn:hover { color: var(--accent); }

    .day-footer { padding: 4px 12px; border-top: 1px solid var(--surface2); height: 32px; display: flex; align-items: center; overflow: hidden; flex-shrink: 0; }
    .progress-pips { display: flex; gap: 3px; flex-wrap: nowrap; overflow: hidden; }
    .pip { width: 6px; height: 6px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    .pip.done { background: var(--accent); }

    /* ── Banners & Modals ── */
    .banner { background: var(--surface2); border-bottom: 1px solid var(--accent); padding: 10px 20px; display: none; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .banner.show { display: flex; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; width: 500px; max-height: 80vh; display: flex; flex-direction: column; }
    .modal-header, .modal-footer { padding: 20px; border-bottom: 1px solid var(--border); }
    .modal-footer { border-bottom: none; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
    .modal-body { padding: 10px 20px; overflow-y: auto; flex: 1; }
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 10px 0; }
    .settings-input, .settings-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: var(--radius); outline: none; width: 100%; }
  </style>
</head>
<body>
<header>
  <div style="display: flex; align-items: baseline; gap: 8px;">
    <span class="logo">Weekly Planner</span>
    <span id="app-version" style="font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); text-transform: none; letter-spacing: normal;">v0.0.0</span>
  </div>
  <div class="week-nav">
    <button class="nav-btn" id="prev-week">‹</button>
    <div class="week-info">
      <span class="cw-label" id="cw-label">CW —</span>
      <span class="week-label" id="week-label">Loading…</span>
    </div>
    <button class="nav-btn" id="next-week">›</button>
    <button class="nav-btn" id="today-btn">🎯</button>
  </div>
  <div class="header-right">
    <button class="icon-btn" id="open-recycle-bin">🗑️</button>
    <button class="icon-btn" id="open-settings">⚙️</button>
  </div>
</header>
<div class="banner" id="update-banner" style="border-bottom-color: var(--accent2);">
  <div class="banner-text"><strong>Update Ready</strong> A new version has been downloaded.</div>
  <div class="banner-btns">
    <button class="banner-btn" id="install-update-btn">Restart to Install</button>
    <button class="banner-btn secondary" id="close-update-banner">Dismiss</button>
  </div>
</div>
<div class="banner" id="stale-banner">
  <div class="banner-text"><strong id="stale-count">0</strong> incomplete tasks found from last week.</div>
  <div class="banner-btns">
    <button class="banner-btn" id="open-cleanup">Review & Cleanup</button>
    <button class="banner-btn secondary" id="close-banner">Dismiss</button>
  </div>
</div>
<div class="grid" id="week-grid"></div>
<div class="modal-overlay" id="cleanup-overlay"><div class="modal"><div class="modal-header"><div class="modal-title">Weekly Cleanup</div></div><div class="modal-body" id="cleanup-list"></div><div class="modal-footer"><button class="banner-btn secondary" id="close-cleanup">Close</button></div></div></div>
<div class="modal-overlay" id="recycle-bin-overlay"><div class="modal"><div class="modal-header"><div class="modal-title">Recycle Bin</div></div><div class="modal-body" id="recycle-bin-list"></div><div class="modal-footer"><button class="banner-btn secondary" id="clear-bin-btn">Clear All</button><button class="banner-btn secondary" id="close-recycle-bin">Close</button></div></div></div>
<div class="modal-overlay" id="settings-overlay"><div class="modal"><div class="modal-header"><div class="modal-title">Settings</div></div><div class="modal-body"><div class="settings-grid"><div class="settings-group" style="grid-column: 1 / -1;"><label class="settings-label">Theme</label><select id="theme-select" class="settings-select"><option value="dark">Dark</option><option value="light">Light</option><option value="nord">Nord</option><option value="dracula">Dracula</option><option value="monokai">Monokai</option><option value="one-dark">One Dark</option><option value="solarized-dark">Solarized Dark</option><option value="solarized-light">Solarized Light</option><option value="gruvbox-dark">Gruvbox Dark</option><option value="synthwave">Synthwave '84</option><option value="cyberpunk">Cyberpunk</option><option value="matrix">Matrix</option><option value="midnight">Midnight</option><option value="high-contrast">High Contrast</option><option value="minimalist">Minimalist</option><option value="slate">Slate</option><option value="ocean">Oceanic</option><option value="forest">Forest</option><option value="emerald">Emerald</option><option value="ruby">Ruby</option><option value="amber">Amber (Retro)</option><option value="sepia">Sepia</option><option value="coffee">Coffee</option><option value="lavender">Lavender</option><option value="pastel">Pastel</option><option value="sakura">Sakura</option></select></div><div class="settings-group" style="grid-column: 1 / -1;"><label class="settings-label">Notification Interval</label><select id="interval-select" class="settings-select"></select></div><div class="settings-group"><label class="settings-label">Work Start</label><input type="number" id="work-start" class="settings-input" min="0" max="23"></div><div class="settings-group"><label class="settings-label">Work End</label><input type="number" id="work-end" class="settings-input" min="0" max="23"></div></div></div><div class="modal-footer"><span id="settings-version" style="font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); margin-right: auto;">v0.0.0</span><button class="banner-btn secondary" id="close-settings">Close</button></div></div></div>
<script src="dist/renderer.js"></script>
</body></html>
