<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
  <div style="display: flex; align-items: baseline; gap: 8px;">
    <span class="logo">Weekly Planner</span>
    <span id="app-version" style="font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); text-transform: none; letter-spacing: normal;">v0.0.0</span>
  </div>
  <div class="week-nav">
    <button class="nav-btn" id="prev-week">‹</button>
    <div class="week-info">
      <span class="cw-label" id="cw-label">CW —</span>
      <span class="week-label" id="week-label">Loading…</span>
    </div>
    <button class="nav-btn" id="next-week">›</button>
    <button class="nav-btn" id="today-btn">🎯</button>
  </div>
  <div class="header-right">
    <button class="icon-btn" id="generate-summary" title="Today's Summary">📋</button>
    <button class="icon-btn" id="open-recycle-bin">🗑️</button>
    <button class="icon-btn" id="open-settings">⚙️</button>
  </div>
</header>
<div class="banner" id="update-banner" style="border-bottom-color: var(--accent2);">
  <div class="banner-text" id="update-status"><strong>Update Ready</strong> A new version has been downloaded.</div>
  <div style="flex: 1; margin: 0 20px; display: none;" id="update-progress-container">
    <div style="height: 4px; background: var(--surface); border-radius: 2px; overflow: hidden; width: 100%;">
      <div id="update-progress-bar" style="height: 100%; background: var(--accent2); width: 0%; transition: width 0.3s;"></div>
    </div>
  </div>
  <div class="banner-btns">
    <button class="banner-btn" id="install-update-btn">Restart to Install</button>
    <button class="banner-btn secondary" id="close-update-banner">Dismiss</button>
  </div>
</div>
<div class="banner" id="stale-banner">
  <div class="banner-text"><strong id="stale-count">0</strong> incomplete tasks found from last week.</div>
  <div class="banner-btns">
    <button class="banner-btn" id="open-cleanup">Review & Cleanup</button>
    <button class="banner-btn secondary" id="close-banner">Dismiss</button>
  </div>
</div>
<div class="banner" id="release-notes-banner">
  <div class="banner-text"><strong>Update Installed</strong> Weekly Planner is now running <span id="banner-version"></span>.</div>
  <div class="banner-btns">
    <button class="banner-btn" id="view-release-notes-btn">What's New</button>
    <button class="banner-btn secondary" id="dismiss-release-notes-btn">Dismiss</button>
  </div>
</div>
<div class="grid" id="week-grid"></div>
<div class="modal-overlay" id="cleanup-overlay"><div class="modal"><div class="modal-header"><div class="modal-title">Weekly Cleanup</div></div><div class="modal-body" id="cleanup-list"></div><div class="modal-footer"><button class="banner-btn secondary" id="close-cleanup">Close</button></div></div></div>
<div class="modal-overlay" id="recycle-bin-overlay"><div class="modal"><div class="modal-header"><div class="modal-title">Recycle Bin</div></div><div class="modal-body" id="recycle-bin-list"></div><div class="modal-footer"><button class="banner-btn secondary" id="clear-bin-btn">Clear All</button><button class="banner-btn secondary" id="close-recycle-bin">Close</button></div></div></div>
<div class="modal-overlay" id="settings-overlay"><div class="modal"><div class="modal-header"><div class="modal-title">Settings</div></div><div class="modal-body"><div class="settings-grid"><div class="settings-group" style="grid-column: 1 / -1;"><label class="settings-label">Theme</label><select id="theme-select" class="settings-select"><option value="dark">Dark</option><option value="light">Light</option><option value="nord">Nord</option><option value="dracula">Dracula</option><option value="monokai">Monokai</option><option value="one-dark">One Dark</option><option value="solarized-dark">Solarized Dark</option><option value="solarized-light">Solarized Light</option><option value="gruvbox-dark">Gruvbox Dark</option><option value="synthwave">Synthwave '84</option><option value="cyberpunk">Cyberpunk</option><option value="matrix">Matrix</option><option value="midnight">Midnight</option><option value="high-contrast">High Contrast</option><option value="minimalist">Minimalist</option><option value="slate">Slate</option><option value="ocean">Oceanic</option><option value="forest">Forest</option><option value="emerald">Emerald</option><option value="ruby">Ruby</option><option value="amber">Amber (Retro)</option><option value="sepia">Sepia</option><option value="coffee">Coffee</option><option value="lavender">Lavender</option><option value="pastel">Pastel</option><option value="sakura">Sakura</option></select></div><div class="settings-group" style="grid-column: 1 / -1;"><label class="settings-label">Notification Interval</label><select id="interval-select" class="settings-select"></select></div><div class="settings-group row">
  <label class="custom-checkbox">
    <input type="checkbox" id="collapse-done-setting">
    <div class="checkbox-box">✓</div>
    <span>Collapse Done Tasks by Default</span>
  </label>
</div>
<div class="settings-group"><label class="settings-label">Work Start</label><input type="number" id="work-start" class="settings-input" min="0" max="23"></div><div class="settings-group"><label class="settings-label">Work End</label><input type="number" id="work-end" class="settings-input" min="0" max="23"></div></div></div><div class="modal-footer"><button id="settings-version-btn" style="background:none; border:none; padding:0; cursor:pointer; font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); margin-right: auto; transition: color 0.15s;" title="View Release Notes" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">v0.0.0</button><button class="banner-btn secondary" id="close-settings">Close</button></div></div></div>

<div class="modal-overlay" id="summary-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Today's Summary</div>
    </div>
    <div class="modal-body" id="summary-content"></div>
    <div class="modal-footer">
      <button class="banner-btn" id="copy-summary-btn">Copy to Clipboard</button>
      <button class="banner-btn secondary" id="close-summary">Close</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="release-notes-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">What's New</div>
    </div>
    <div class="modal-body" id="release-notes-content"></div>
    <div class="modal-footer">
      <button class="banner-btn secondary" id="close-release-notes">Close</button>
    </div>
  </div>
</div>
<script src="dist/renderer.js"></script>
</body></html>
