<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0c0c0c;
      --surface:  #141414;
      --surface2: #1a1a1a;
      --border:   #2a2a2a;
      --accent:   #e8ff47;
      --accent2:  #ff6b35;
      --text:     #f0f0f0;
      --muted:    #555;
      --done:     #2a2a2a;
      --done-text:#444;
      --today-bg: #1c1f0f;
      --today-border: #e8ff47;
      --radius:   4px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .week-nav {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .week-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 130px;
    }

    .cw-label {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.2;
    }

    .week-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .nav-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 18px;
      width: 28px;
      height: 28px;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
    .nav-btn:disabled { opacity: 0.2; cursor: default; }
    .nav-btn:disabled:hover { border-color: var(--border); color: var(--muted); }

    /* ── Grid ── */
    .grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1px;
      background: var(--border);
      overflow: hidden;
    }

    .day-col {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .day-col.today {
      background: var(--today-bg);
    }

    /* Day header */
    .day-header {
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .day-col.today .day-header {
      border-bottom-color: var(--today-border);
    }

    .day-name {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .day-col.today .day-name { color: var(--accent); }

    .day-date {
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      margin-top: 2px;
    }

    .day-col.today .day-date { color: var(--accent); }

    .day-month {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Task area */
    .day-tasks {
      flex: 1;
      overflow-y: auto;
      padding: 8px 8px 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .day-tasks::-webkit-scrollbar {
      width: 4px;
    }

    .day-tasks::-webkit-scrollbar-track {
      background: transparent;
    }

    .day-tasks::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }

    .day-tasks::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    /* Task item */
    .task-item {
      display: grid;
      grid-template-columns: 20px 1fr 16px;
      align-items: start;
      gap: 6px;
      padding: 6px 6px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      transition: border-color 0.1s;
      animation: fadeIn 0.15s ease both;
      cursor: grab;
    }

    .task-item:active { cursor: grabbing; }
    .task-item.dragging { opacity: 0.3; background: var(--surface2); border: 1px dashed var(--accent); }
    .task-item.dragging * { pointer-events: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item:hover { border-color: var(--border); }

    .task-item.done { opacity: 0.5; }

    .check-btn {
      width: 16px;
      height: 16px;
      border: 1.5px solid var(--border);
      border-radius: 3px;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
      transition: all 0.1s;
      color: transparent;
      font-size: 9px;
    }

    .check-btn:hover { border-color: var(--accent); }

    .task-item.done .check-btn {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    .task-text {
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 12px;
      outline: none;
      width: 100%;
      line-height: 1.4;
      resize: none;
      overflow: hidden;
      min-height: 18px;
    }

    .task-item.done .task-text {
      color: var(--done-text);
      text-decoration: line-through;
    }

    .task-text::placeholder { color: var(--muted); }

    .del-btn {
      background: transparent;
      border: none;
      color: transparent;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
      margin-top: 1px;
      flex-shrink: 0;
      transition: color 0.1s;
    }

    .task-item:hover .del-btn { color: var(--muted); }
    .del-btn:hover { color: var(--accent2) !important; }

    /* Add task button */
    .add-task-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      padding: 4px 6px;
      border-radius: var(--radius);
      width: 100%;
      text-align: left;
      transition: color 0.1s;
      flex-shrink: 0;
      margin-bottom: 4px;
    }

    .add-task-btn:hover { color: var(--accent); }

    /* Progress pip row */
    .day-footer {
      padding: 4px 8px 8px;
      flex-shrink: 0;
    }

    .progress-pips {
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
    }

    .pip {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.2s;
    }

    .pip.done { background: var(--accent); }

    /* Saved flash */
    #saved-flash {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: var(--accent);
      color: #000;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 12px;
      border-radius: var(--radius);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    #saved-flash.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <span class="logo">Daily Planner</span>
  <div class="week-nav">
    <button class="nav-btn" id="prev-week" title="Previous week">‹</button>
    <div class="week-info">
      <span class="cw-label" id="cw-label">CW —</span>
      <span class="week-label" id="week-label">Loading…</span>
    </div>
    <button class="nav-btn" id="next-week" title="Next week">›</button>
  </div>
</header>

<div class="grid" id="week-grid"></div>

<div id="saved-flash">Saved ✓</div>

<script src="renderer.js"></script>
</body>
</html>
